name: TheraEpiFlow
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools<81        # mhcflurry 2.0.6 still imports pkg_resources; removed in setuptools 81+
  - pip:
    - biopython>=1.81
    - pandas>=1.5.3
    - numpy>=1.24
    - openpyxl>=3.1        # XLSX writers in every step + pd.read_excel in integrate_data
    - xlsxwriter>=3.1
    - jinja2>=3.1          # HTML template engine for generate_report
    - requests>=2.31       # IEDB API + UniProt fetches
    - rich>=13.7           # entire CLI UX
    - networkx>=3.4        # clustering graph in cluster_epitopes
    - matplotlib>=3.7      # heatmap / hit-chart PNG renderers in analyze_conservation and population_coverage
    - seaborn>=0.13        # comparative coverage matrix + position-conservation heatmap
    - joblib>=1.3          # explicit: loads ToxinPred3 model.pkl in screen_toxicity
    - scikit-learn==1.2.2  # exact pin: required for ToxinPred3 model.pkl deserialization
    - tensorflow==2.15.0   # exact pin: MHCFlurry 2.0 requires TF 2.x (2.16+ breaks it)
    - mhcflurry==2.0.6     # exact pin: 2.2+ changed prediction API (incompatible)
    - toxinpred3>=1.4
